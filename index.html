<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Romania Map</title>


  <!-- Mapbox CSS -->

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.css"
    rel="stylesheet"
  >


  <!-- DEIN WEBFLOW DESIGN ALS CSS -->

  <style>

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }


    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }


    /* Popup */

    #project-popup {
      position: absolute;
      z-index: 20;

      width: 280px;

      background: white;

      border-radius: 12px;

      overflow: hidden;

      display: none;
    }


    /* Bild */

    #popup-image {
      display: none;

      width: 100%;

      height: auto;

      object-fit: contain;
    }


    /* Inhaltsbereich */

    .popup-content {
      padding:
        12px
        12px
        20px
        12px;
    }


    /* Projektname */

    #popup-name {
      margin: 0 0 2px 0;

      font-size: 18px;

      line-height: 22px;

      font-weight: 700;

      color: #333;
    }


    /* Ort */

    #popup-city {
      margin: 0 0 8px 0;

      font-size: 14px;

      line-height: 20px;

      color: #333;
    }


    /* Factsheet */

    #popup-factsheet {
      display: inline-block;

      font-size: 14px;

      line-height: 20px;

      color: #0000ee;

      text-decoration: underline;
    }

  </style>

</head>


<body>


  <!-- MAPBOX KARTE -->

  <div id="map"></div>


  <!-- DEIN WEBFLOW POPUP -->

  <div id="project-popup">

    <img
      id="popup-image"
      alt=""
    >

    <div class="popup-content">

      <h2 id="popup-name"></h2>

      <div id="popup-city"></div>

      <a
        id="popup-factsheet"
        href="#"
      >
        view Factsheet
      </a>

    </div>

  </div>


  <!-- MAPBOX JAVASCRIPT -->

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.js"></script>


  <script>

    /*
    HIER KOMMT DEIN KOMPLETTER
    AKTUELLER MAPBOX-JAVASCRIPT-CODE HIN
    */

  </script>


</body>

</html>
